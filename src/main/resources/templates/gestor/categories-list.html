<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>TODO App</title>
    <link rel="icon" type="image/png" th:href="@{/imgs/logo_todo.png}" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <script th:inline="javascript">
        /* Obtener usuario logeado */
        const currentUserId = /*[[${user != null ? user.id : -1}]]*/ -1;
    </script>
</head>

<body>
    <div th:replace="~{fragments/navbar :: navbar (title='Dashboard del Gestor', user=${user})}"></div>
    <div class="container mt-4">
        <!-- Card categorias-->
        <div class="bg-white rounded-3 p-4 mb-4 shadow-sm">
            <div class="page-header">
                <div>
                    <h2 class="mb-1"><i class="fas fa-tags me-2 text-primary"></i>Categorias del Sistema</h2>
                    <p class="text-muted mb-0">Organiza las tareas en diferentes categorias</p>
                </div>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#categoryModal"
                    onclick="resetCategoryForm()">
                    <i class="fas fa-plus-circle me-2"></i>Nueva Categoria
                </button>
            </div>
        </div>

        <div class="bg-white rounded-3 shadow-sm">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead style="background-color: var(--color-logo-primary); color: white;">
                        <tr>
                            <th class="py-3">ID</th>
                            <th class="py-3">Titulo</th>
                            <th class="py-3">Creado por</th>
                            <th class="py-3">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="categoriesTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/forms/category-form :: categoryForm}"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        /* Cargar todas las categorias */
        let allCategories = [];
        function loadCategories() {
            $.ajax({
                url: "/api/gestor/categories",
                method: "GET",
                success: function (categories) {
                    allCategories = categories;
                    displayCategories(categories);
                },
                error: function (xhr) {
                    console.error("Error loading categories:", xhr);
                    showNotification("Error al cargar categorias", "danger");
                }
            });
        }
        /* Listar categorias */
        function displayCategories(categories) {
            let html = "";
            categories.forEach((category) => {
                const userName = category.user ? category.user.username : 'Sistema';
                const categoryOwnerId = category.user ? category.user.id : null;

                let actionButtons = "";

                /* Si la categoría pertenece al usuario actual logueado , puede ver botones de editar y eliminar*/
                if (categoryOwnerId !== null && categoryOwnerId === currentUserId) {
                    actionButtons = `
                    <button class="btn btn-sm btn-outline-warning" onclick="editCategory(${category.id})" title="Editar">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteCategory(${category.id}, '${category.title}')" title="Eliminar">
                        <i class="fas fa-trash"></i>
                    </button>
                `;
                } else {
                    // Si es del sistema o de otro usuario, mostramos solo lectura
                    actionButtons = `<span class="badge bg-light text-muted border">Solo lectura</span>`;
                }

                html += `
                <tr>
                    <td class="py-3" data-label="ID">${category.id}</td>
                    <td class="py-3" data-label="Titulo"><i class="fas fa-folder me-2 text-secondary"></i><strong>${category.title}</strong></td>
                    <td class="py-3" data-label="Creado por"><i class="fas fa-user me-2 text-muted"></i>${userName}</td>
                    <td class="py-3" data-label="Acciones">
                        <div class="d-flex flex-wrap gap-1 justify-content-end justify-content-md-start">
                        ${actionButtons}
                        </div>
                    </td>
                </tr>
            `;
            });
            $("#categoriesTableBody").html(html);
        }
        /* Guardar categoria - crear editar */
        function saveCategory() {
            const categoryData = {
                title: $("#categoryTitle").val(),
            };

            // Comprobar si es edicion o creacion
            const categoryId = $("#categoryId").val();
            const method = categoryId ? "PUT" : "POST";
            let url = categoryId ? `/api/gestor/category/${categoryId}` : "/api/gestor/category";

            $.ajax({
                url: url,
                method: method,
                contentType: "application/json",
                data: JSON.stringify(categoryData),
                success: function () {
                    $("#categoryModal").modal("hide");
                    loadCategories();
                    showNotification("Categoria guardada correctamente", "success");
                },
                error: function (xhr) {
                    showNotification(xhr.responseJSON?.message || "Error al guardar", "danger");
                },
            });
        }
        /* Editar categoria */
        function editCategory(id) {
            const category = allCategories.find((c) => c.id === id);
            if (category) {
                if (category.user && category.user.id !== currentUserId) {
                    showNotification("No tienes permisos para editar esta categoria", "danger");
                    return;
                }
                $("#categoryId").val(category.id);
                $("#categoryTitle").val(category.title);
                $("#categoryModal").modal("show");
            }
        }
        /* Eliminar categoria */
        function deleteCategory(id, title) {
            const category = allCategories.find((c) => c.id === id);
            // Solo eliminar las categorias propias
            if (category && category.user && category.user.id !== currentUserId) {
                showNotification("No tienes permisos para eliminar esta categoria", "danger");
                return;
            }

            if (confirm(`¿Eliminar la categoria "${title}"?`)) {
                $.ajax({
                    url: `/api/gestor/category/${id}`,
                    method: "DELETE",
                    success: function () {
                        loadCategories();
                        showNotification("Categoria eliminada", "success");
                    },
                    error: function (xhr) {
                        showNotification(xhr.responseJSON?.message || "Error al eliminar", "danger");
                    }
                });
            }
        }
        /* Limpiar formulario */
        function resetCategoryForm() {
            $("#categoryId").val("");
            $("#categoryTitle").val("");
            $("#categoryForm")[0].reset();
        }

        /* Mostrra notificacion */
        function showNotification(message, type) {
            const alert = $(`
            <div class="alert alert-${type} alert-dismissible fade show position-fixed top-0 end-0 m-3" style="z-index: 9999;">
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        `);
            $("body").append(alert);
            setTimeout(() => alert.alert('close'), 3000);
        }
        /* LLamada inicial */
        $(document).ready(function () {
            loadCategories();
        });
    </script>
</body>

</html>
