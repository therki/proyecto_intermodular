<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>TODO App</title>
    <link rel="icon" type="image/png" th:href="@{/imgs/logo_todo.png}" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <link rel="stylesheet" th:href="@{/css/tasks.css}" />
    <link rel="stylesheet" th:href="@{/css/forms.css}" />

</head>

<body>
    <!-- Barra de navegacion -->
    <div th:replace="~{fragments/navbar :: navbar (title='Dashboard del Usuario', user=${user})}"></div>
    <!-- Modal de Etiqueta -->
    <div th:replace="~{fragments/forms/tag-form :: tagModal}"></div>

    <div class="container mt-4">
        <div class="page-header mb-4">
            <h2><i class="fas fa-tags me-2"></i>Mis Etiquetas</h2>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#tagModal" onclick="resetTagForm()">
                <i class="fas fa-plus-circle me-2"></i>Nueva Etiqueta
            </button>
        </div>

        <!-- Barra de búsqueda -->
        <div class="filter-bar">
            <div class="row">
                <div class="col-md-8 mb-2">
                    <input type="text" class="form-control" id="searchTag" placeholder="Buscar etiqueta...">
                </div>
                <div class="col-md-4 mb-2">
                    <button class="btn btn-secondary w-100" onclick="clearSearch()">
                        <i class="fas fa-eraser me-1"></i>Limpiar
                    </button>
                </div>
            </div>
        </div>

        <!-- Contador de etiquetas -->
        <div class="mb-3">
            <span class="badge bg-secondary" id="tagCount">0 etiquetas</span>
        </div>

        <!-- Cards de etiquetas -->
        <div id="tagsGrid" class="row">
            <div class="col-12 text-center">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let allTags = [];

        /* Cargar todas las etiquetas */
        function loadTags() {
            $.ajax({
                url: '/api/user/tags',
                method: 'GET',
                success: function (tags) {
                    allTags = tags;
                    applyFilter();
                },
                error: function (xhr) {
                    console.error('Error al cargar etiquetas:', xhr);
                    $('#tagsGrid').html(`
                    <div class="col-12">
                        <div class="empty-tags">
                            <p>No se han encontrado etiquetas.</p>
                        </div>
                    </div>
                `);
                }
            });
        }

        /* Buscar etiqueta */
        function applyFilter() {
            const searchTerm = $('#searchTag').val().toLowerCase().trim();

            let filteredTags = [...allTags];

            if (searchTerm) {
                filteredTags = filteredTags.filter(tag =>
                    tag.name.toLowerCase().includes(searchTerm)
                );
            }

            displayTags(filteredTags);
        }

        /* Mostrar etiquetas*/
        function displayTags(tags) {
            // Actualizar contador
            $('#tagCount').text(`${tags.length} ${tags.length === 1 ? 'etiqueta' : 'etiquetas'}`);

            if (tags.length === 0) {
                const searchTerm = $('#searchTag').val();
                const hasSearch = searchTerm && searchTerm.trim() !== '';

                $('#tagsGrid').html(`
                <div class="col-12">
                    <div class="empty-tags">
                        <i class="fas fa-${hasSearch ? 'search' : 'tags'}"></i>
                        <h4>${hasSearch ? 'No se encontraron etiquetas' : 'No tienes etiquetas aún'}</h4>
                        <p class="text-muted">
                            ${hasSearch ? 'No hay etiquetas que coincidan con tu búsqueda.' : 'Crea tu primera etiqueta para organizar mejor tus tareas.'}
                        </p>
                        ${!hasSearch ? `
                            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#tagModal" onclick="resetTagForm()">
                                <i class="fas fa-plus-circle me-2"></i>Crear Primera Etiqueta
                            </button>
                        ` : ''}
                    </div>
                </div>
            `);
                return;
            }

            let html = '';
            tags.forEach(tag => {
                html += `
                <div class="col-md-3 col-sm-6 mb-3">
                    <div class="card tag-card h-100">
                        <div class="card-body text-center">
                            <i class="fas fa-tag fa-2x text-primary mb-3"></i>
                            <h5 class="tag-name">${tag.name}</h5>
                            <p class="text-muted small">ID: ${tag.id}</p>
                            <div class="mt-3">
                                <button class="btn btn-sm btn-warning me-2" onclick="editTag(${tag.id}, '${tag.name}')" title="Editar">
                                    <i class="fas fa-edit"></i> Editar
                                </button>
                                <button class="btn btn-sm btn-danger" onclick="deleteTag(${tag.id}, '${tag.name}')" title="Eliminar">
                                    <i class="fas fa-trash"></i> Eliminar
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            });
            $('#tagsGrid').html(html);
        }

        // Limpiar búsqueda
        function clearSearch() {
            $('#searchTag').val('');
            applyFilter();
        }

        // Escuchar cambios en búsqueda
        $('#searchTag').on('input', function () {
            applyFilter();
        });


        // Inicializar
        $(document).ready(function () {
            loadTags();

            // Cuando se cierre el modal, resetear formulario
            $('#tagModal').on('hidden.bs.modal', function () {
                resetTagForm();
            });
        });
    </script>

    <!-- Scripts del modal (fragmento) -->
    <th:block th:replace="~{fragments/forms/tag-form :: tagModalScripts}"></th:block>
</body>

</html>
