<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" th:href="@{/imgs/logo_todo.png}" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>TODO App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <link rel="stylesheet" th:href="@{/css/tasks.css}" />
    <link rel="stylesheet" th:href="@{/css/forms.css}" />
</head>

<body th:classappend="${user != null && user.role.name() == 'ADMIN'} ? 'role-admin' : 
                      (${user != null && user.role.name() == 'GESTOR'} ? 'role-gestor' : 'role-usuario')">
    <!-- Barra de navegacion -->
    <div th:replace="~{fragments/navbar :: navbar (title='Mi Dashboard', user=${user})}"></div>

    <!-- Modal de Perfil -->
    <div th:replace="~{fragments/forms/profile-form :: profileModal}"></div>

    <div class="container mt-4">
        <!-- KPIs -->
        <div class="row g-3 mb-4">
            <!-- Totales-->
            <div class="col-6 col-md-3">
                <div class="bg-white rounded-3 p-3 shadow-sm text-center h-100">
                    <i class="fas fa-tasks  fs-4 mb-2" style="color: var(--color-logo-primary);"></i>
                    <div class="fs-3 fw-bold" style="color: var(--color-logo-primary);" id="totalTasks">-</div>
                    <div class="text-muted small">Total Tareas</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="bg-white rounded-3 p-3 shadow-sm text-center h-100">
                    <i class="fas fa-check-circle fs-4 mb-2" style="color: #87CEEB;"></i>
                    <div class="fs-3 fw-bold" style="color: #87CEEB;" id="completedTasks">-</div>
                    <div class="text-muted small">Completadas</div>
                </div>
            </div>
            <!-- PEndientes-->
            <div class="col-6 col-md-3">
                <div class="bg-white rounded-3 p-3 shadow-sm text-center h-100">
                    <i class="fas fa-clock fs-4 mb-2" style="color: #DEAEAA;"></i>
                    <div class="fs-3 fw-bold" style="color: #DEAEAA;" id="pendingTasks">-</div>
                    <div class="text-muted small">Pendientes</div>
                </div>
            </div>
            <!-- Vencidas-->
            <div class="col-6 col-md-3">
                <div class="bg-white rounded-3 p-3 shadow-sm text-center h-100">
                    <i class="fas fa-exclamation-triangle text-danger fs-4 mb-2"></i>
                    <div class="fs-3 fw-bold text-danger" id="overdueTasks">-</div>
                    <div class="text-muted small">Vencidas</div>
                </div>
            </div>
        </div>

        <!-- Cards -->
        <div class="row g-4">
            <div class="col-sm-6 col-lg-4">
                <!-- Card tareas-->
                <div class="card h-100 shadow-sm">
                    <div class="card-body d-flex flex-column">
                        <div class="d-flex align-items-center gap-2 mb-3">
                            <i class="fas fa-tasks  fs-4" style="color: var(--color-primary);"></i>
                            <h5 class="mb-0">Mis Tareas</h5>
                        </div>
                        <p class="card-text text-muted">Gestiona todas tus tareas pendientes y completadas.</p>
                        <div class="mt-auto">
                            <a th:href="@{/user/tasks}" class="btn btn-primary">
                                <i class="fas fa-arrow-right me-1"></i> Ir a Tareas
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Card etiquetas (tono primario del rol) -->
            <div class="col-sm-6 col-lg-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body d-flex flex-column">
                        <div class="d-flex align-items-center gap-2 mb-3">
                            <i class="fas fa-tags fs-4" style="color: var(--color-primary);"></i>
                            <h5 class="mb-0">Mis Etiquetas</h5>
                        </div>
                        <p class="card-text text-muted">Organiza tus tareas con etiquetas personalizadas.</p>
                        <div class="mt-auto">
                            <a th:href="@{/user/tags}" class="btn btn-primary">
                                <i class="fas fa-arrow-right me-1"></i> Ir a Etiquetas
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Card editar perfil  -->
            <div class="col-sm-6 col-lg-4">
                <div class="card h-100 shadow-sm" style="cursor: pointer;" data-bs-toggle="modal"
                    data-bs-target="#profileModal" onclick=" resetProfileForm();loadProfileData();">
                    <div class="card-body d-flex flex-column">
                        <div class="d-flex align-items-center gap-2 mb-3">
                            <i class="fas fa-user-edit fs-4" style="color: #87CEEB"></i>
                            <h5 class="mb-0">Editar Perfil</h5>
                        </div>
                        <p class="card-text text-muted">Actualiza tu informacion personal y contrasena.</p>
                        <div class="mt-auto">
                            <span class="btn"  style="background-color: #87CEEB">
                                <i class="fas fa-edit me-1"></i> Editar Perfil
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        /* Obtener kpis */
        function loadKPIs() {
            $.ajax({
                url: '/api/user/tasks',
                method: 'GET',
                success: function (tasks) {
                    // Total tareas
                    const total = tasks.length;
                    // Tareas completadas
                    const completed = tasks.filter(t => t.completed === true).length;
                    // Tareas pednientes
                    const pending = total - completed;
                    // Tareas pasadas - fecha menor que hoy
                    const today = new Date();
                    const overdue = tasks.filter(task => {
                        if (task.completed === true) return false;
                        if (!task.deadline) return false;
                        const deadlineDate = new Date(task.deadline);
                        return deadlineDate < today;
                    }).length;

                    $('#totalTasks').text(total);
                    $('#completedTasks').text(completed);
                    $('#pendingTasks').text(pending);
                    $('#overdueTasks').text(overdue);
                },
                // Si da error marcar todas como 0
                error: function (xhr) {
                    console.error('Error al cargar tareas:', xhr);
                    $('#totalTasks').text('0');
                    $('#completedTasks').text('0');
                    $('#pendingTasks').text('0');
                    $('#overdueTasks').text('0');
                }
            });
        }
        /* Cargar kpis al iniciar */
        $(document).ready(function () {
            loadKPIs();
            setInterval(loadKPIs, 30000);
        });
    </script>

    <!-- Modal de perfil -->
    <th:block th:replace="~{fragments/forms/profile-form :: profileModalScripts}"></th:block>
</body>

</html>
