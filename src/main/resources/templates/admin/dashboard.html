<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <title>TODO App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link rel="stylesheet" th:href="@{/css/main.css}" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
  <div th:replace="~{fragments/navbar :: navbar (title='Dashboard del Administrador', user=${user})}"></div>

  <div class="container mt-4" id="admin-dashboard">
    <div class="row">
      <!-- Card de usuarios-->
      <div class="col-sm-6 mb-3 mb-sm-0">
        <div class="card h-100 shadow-sm stat-card">
          <div class="card-body">
            <div class="card-title d-flex align-items-center gap-2 mb-3">
              <i class="bi bi-people-fill text-primary fs-4"></i>
              <h5 class="mb-0">Usuarios</h5>

            </div>
            <p class="card-text">
              Información y gestión de los usuarios de la aplicación.
            </p>
            <div class="card-action mt-auto">
              <a th:href="@{/admin/users}" class="btn btn-primary btn-action">
                <i class="bi bi-arrow-right-circle"></i> Gestionar
              </a>
            </div>
          </div>
        </div>
      </div>

      <!-- Card de categorias-->
      <div class="col-sm-6">
        <div class="card h-100 shadow-sm stat-card">
          <div class="card-body d-flex flex-column">
            <div class="card-title d-flex align-items-center gap-2 mb-3">
              <i class="bi bi-tags-fill text-primary fs-4"></i>
              <h5 class="mb-0">Categorías</h5>
            </div>
            <p class="card-text">
              Listado y gestión de las categorías de la aplicación.
            </p>
            <div class="card-action mt-auto">
              <a th:href="@{/admin/categories}" class="btn btn-primary">
                <i class="bi bi-arrow-right-circle"></i> Gestionar
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
