<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>TODO App</title>
  <link rel="icon" type="image/png" th:href="@{/imgs/logo_todo.png}" />
  <link rel="stylesheet" th:href="@{/css/main.css}" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body th:classappend="${user != null && user.role.name() == 'ADMIN'} ? 'role-admin' : 
                      (${user != null && user.role.name() == 'GESTOR'} ? 'role-gestor' : 'role-usuario')">
  <!-- Barra de navegacion-->
  <div th:replace="~{fragments/navbar :: navbar (title='Panel Administrador', user=${user})}"></div>

  <div class="container mt-4" id="admin-dashboard">
    <div class="row g-3">
      <!-- Card de usuarios-->
      <div class="col-12 col-sm-6">
        <div class="card h-100 shadow-sm stat-card">
          <div class="card-body">
            <div class="card-title d-flex align-items-center gap-2 mb-3">
              <i class="bi bi-people-fill  fs-4" style="color: var(--color-primary)"></i>
              <h5 class="mb-0">Usuarios</h5>

            </div>
            <p class="card-text">
              Información y gestión de los usuarios de la aplicación.
            </p>
            <div class="card-action mt-auto">
              <a th:href="@{/admin/users}" class="btn btn-primary btn-action">
                <i class="bi bi-arrow-right-circle"></i> Gestionar
              </a>
            </div>
          </div>
        </div>
      </div>

      <!-- Card de categorias-->
      <div class="col-12 col-sm-6">
        <div class="card h-100 shadow-sm stat-card">
          <div class="card-body d-flex flex-column">
            <div class="card-title d-flex align-items-center gap-2 mb-3">
              <i class="bi bi-tags-fill  fs-4" style="color: var(--color-primary)"></i>
              <h5 class="mb-0">Categorías</h5>
            </div>
            <p class="card-text">
              Listado y gestión de las categorías de la aplicación.
            </p>
            <div class="card-action mt-auto">
              <a th:href="@{/admin/categories}" class="btn btn-primary">
                <i class="bi bi-arrow-right-circle"></i> Gestionar
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
