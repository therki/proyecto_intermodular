<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="icon" type="image/png" th:href="@{/imgs/logo_todo.png}" />

    <title>TODO App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <link rel="stylesheet" th:href="@{/css/login.css}" />
    <link rel="stylesheet" th:href="@{/css/forms.css}" />
</head>

<body>
    <div class="login-wrapper">
        <div class="card register-card">
            <div class="card-header">
                <img th:src="@{/imgs/logo_todo.png}" alt="Logo aplicación TODO" />
                <h4 class="mb-0">Crear Cuenta</h4>
                <p class="text-muted mt-2 mb-0">Regístrate para empezar a organizar tus tareas</p>
            </div>
            <div class="card-body">
                <!-- Mensajes de error/success -->
                <div id="messageContainer"></div>

                <form id="registerForm">
                    <!-- Username -->
                    <div class="mb-1">
                        <label for="username" class="form-label">
                            <i class="fas fa-user me-2"></i>Nombre de Usuario *
                        </label>
                        <input type="text" class="form-control" id="username" name="username">
                        <div id="usernameError" class="error-message"></div>
                        <small class="text-muted">Mínimo 3 caracteres</small>
                    </div>

                    <!-- Nombre completo -->
                    <div class="mb-1">
                        <label for="fullname" class="form-label">
                            <i class="fas fa-id-card me-2"></i>Nombre Completo *
                        </label>
                        <input type="text" class="form-control" id="fullname" name="fullname">
                        <div id="fullnameError" class="error-message"></div>
                    </div>

                    <!-- Email -->
                    <div class="mb-1">
                        <label for="email" class="form-label">
                            <i class="fas fa-envelope me-2"></i>Correo Electrónico *
                        </label>
                        <input type="email" class="form-control" id="email" name="email">
                        <div id="emailError" class="error-message"></div>
                        <small class="text-muted">Ejemplo: usuario@correo.com</small>
                    </div>

                    <!-- Contraseña -->
                    <div class="mb-1">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock me-2"></i>Contraseña *
                        </label>
                        <input type="password" class="form-control" id="password" name="password">
                        <div id="passwordError" class="error-message"></div>
                        <small class="text-muted">Mínimo 4 caracteres</small>
                    </div>

                    <!-- Confirmar contraseña -->
                    <div class="mb-1">
                        <label for="confirmPassword" class="form-label">
                            <i class="fas fa-check-circle me-2"></i>Confirmar Contraseña *
                        </label>
                        <input type="password" class="form-control" id="confirmPassword" name="confirmPassword">
                        <div id="confirmError" class="error-message"></div>
                    </div>

                    <button type="button" class="btn btn-login w-100" onclick="registerUser()">
                        <i class="fas fa-user-plus me-2"></i>Registrarse
                    </button>
                </form>

                <hr class="my-4">

                <div class="text-center">
                    <p class="mb-0">¿Ya tienes cuenta?</p>
                    <a th:href="@{/login}" class="btn btn-outline-secondary mt-2 w-100">
                        <i class="fas fa-sign-in-alt me-2"></i>Iniciar Sesión
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Validación en tiempo real
        function setupRealtimeValidation() {
            // Username
            $('#username').on('input', function () {
                const val = $(this).val().trim();
                if (!val || val.length < 3) {
                    $(this).addClass('input-error');
                    $('#usernameError').text('El nombre de usuario debe tener al menos 3 caracteres');
                } else {
                    $(this).removeClass('input-error');
                    $('#usernameError').text('');
                }
            });

            // Fullname
            $('#fullname').on('input', function () {
                const val = $(this).val().trim();
                if (!val) {
                    $(this).addClass('input-error');
                    $('#fullnameError').text('El nombre completo es obligatorio');
                } else {
                    $(this).removeClass('input-error');
                    $('#fullnameError').text('');
                }
            });

            // Email
            $('#email').on('input', function () {
                const val = $(this).val().trim();
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!val) {
                    $(this).addClass('input-error');
                    $('#emailError').text('El email es obligatorio');
                } else if (!emailRegex.test(val)) {
                    $(this).addClass('input-error');
                    $('#emailError').text('Ingrese un email válido');
                } else {
                    $(this).removeClass('input-error');
                    $('#emailError').text('');
                }
            });

            // Password
            $('#password').on('input', function () {
                const val = $(this).val();
                if (!val) {
                    $(this).addClass('input-error');
                    $('#passwordError').text('La contraseña es obligatoria');
                } else if (val.length < 4) {
                    $(this).addClass('input-error');
                    $('#passwordError').text('La contraseña debe tener al menos 4 caracteres');
                } else {
                    $(this).removeClass('input-error');
                    $('#passwordError').text('');
                }

                // Verificar confirmación si ya tiene valor
                const confirm = $('#confirmPassword').val();
                if (confirm) {
                    if (val !== confirm) {
                        $('#confirmPassword').addClass('input-error');
                        $('#confirmError').text('Las contraseñas no coinciden');
                    } else {
                        $('#confirmPassword').removeClass('input-error');
                        $('#confirmError').text('');
                    }
                }
            });

            // Confirm Password
            $('#confirmPassword').on('input', function () {
                const password = $('#password').val();
                const confirm = $(this).val();
                if (password !== confirm) {
                    $(this).addClass('input-error');
                    $('#confirmError').text('Las contraseñas no coinciden');
                } else {
                    $(this).removeClass('input-error');
                    $('#confirmError').text('');
                }
            });
        }

        // Registrar usuario
        function registerUser() {
            // Limpiar errores previos
            $('.input-error').removeClass('input-error');
            $('.error-message').text('');
            $('#messageContainer').html('');

            // Obtener valores
            const username = $('#username').val().trim();
            const fullname = $('#fullname').val().trim();
            const email = $('#email').val().trim();
            const password = $('#password').val();
            const confirmPassword = $('#confirmPassword').val();

            let hasErrors = false;

            // Validar username
            if (!username) {
                $('#username').addClass('input-error');
                $('#usernameError').text('El nombre de usuario es obligatorio');
                hasErrors = true;
            } else if (username.length < 3) {
                $('#username').addClass('input-error');
                $('#usernameError').text('El nombre de usuario debe tener al menos 3 caracteres');
                hasErrors = true;
            }

            // Validar fullname
            if (!fullname) {
                $('#fullname').addClass('input-error');
                $('#fullnameError').text('El nombre completo es obligatorio');
                hasErrors = true;
            }

            // Validar email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!email) {
                $('#email').addClass('input-error');
                $('#emailError').text('El email es obligatorio');
                hasErrors = true;
            } else if (!emailRegex.test(email)) {
                $('#email').addClass('input-error');
                $('#emailError').text('Ingrese un email válido');
                hasErrors = true;
            }

            // Validar contraseña
            if (!password) {
                $('#password').addClass('input-error');
                $('#passwordError').text('La contraseña es obligatoria');
                hasErrors = true;
            } else if (password.length < 4) {
                $('#password').addClass('input-error');
                $('#passwordError').text('La contraseña debe tener al menos 4 caracteres');
                hasErrors = true;
            }

            // Validar confirmación
            if (!confirmPassword) {
                $('#confirmPassword').addClass('input-error');
                $('#confirmError').text('Debes confirmar tu contraseña');
                hasErrors = true;
            } else if (password !== confirmPassword) {
                $('#confirmPassword').addClass('input-error');
                $('#confirmError').text('Las contraseñas no coinciden');
                hasErrors = true;
            }

            if (hasErrors) {
                return;
            }

            // Datos para enviar (rol USUARIO por defecto)
            const userData = {
                username: username,
                fullname: fullname,
                email: email,
                password: password,
                role: "USUARIO"
            };

            // Mostrar loading
            const $btn = $('.btn-primary');
            const originalText = $btn.html();
            $btn.html('<i class="fas fa-spinner fa-spin me-2"></i>Registrando...').prop('disabled', true);

            $.ajax({
                url: '/auth/register',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(userData),
                success: function () {
                    // Limpiar formulario
                    $('#registerForm')[0].reset();
                    $('.input-error').removeClass('input-error');

                    // Mostrar mensaje de éxito
                    $('#messageContainer').html(`
                        <div class="alert alert-success alert-dismissible fade show" role="alert">
                            <i class="fas fa-check-circle me-2"></i>
                            ¡Usuario registrado correctamente! Redirigiendo al login...
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    `);

                    // Redirigir al login después de 2 segundos
                    setTimeout(() => {
                        window.location.href = '/login?registered=true';
                    }, 2000);
                },
                error: function (xhr) {
                    let message = 'Error al registrar usuario';
                    if (xhr.responseJSON && xhr.responseJSON.detail) {
                        message = xhr.responseJSON.detail;
                    } else if (xhr.responseJSON && xhr.responseJSON.message) {
                        message = xhr.responseJSON.message;
                    }

                    $('#messageContainer').html(`
                        <div class="alert alert-danger alert-dismissible fade show" role="alert">
                            <i class="fas fa-exclamation-circle me-2"></i>
                            ${message}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    `);
                },
                complete: function () {
                    $btn.html(originalText).prop('disabled', false);
                }
            });
        }

        // Inicializar
        $(document).ready(function () {
            setupRealtimeValidation();

            // Si viene de redirección con parámetro registered, mostrar mensaje
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('registered') === 'true') {
                $('#messageContainer').html(`
                    <div class="alert alert-success alert-dismissible fade show" role="alert">
                        <i class="fas fa-check-circle me-2"></i>
                        Usuario registrado correctamente. ¡Ahora puedes iniciar sesión!
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                `);
            }
        });
    </script>
</body>

</html>
