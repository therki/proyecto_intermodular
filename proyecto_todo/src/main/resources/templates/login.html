<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="icon" type="image/png" th:href="@{/imgs/logo_todo.png}" />

    <title>TODO App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <link rel="stylesheet" th:href="@{/css/login.css}" />
    <link rel="stylesheet" th:href="@{/css/forms.css}" />
</head>

<body>
    <div class="login-wrapper">
        <div class="card">
            <div class="card-header">
                <img th:src="@{/imgs/logo_todo.png}" alt="Logo aplicación TODO" />
                <h4 class="mb-0">Iniciar Sesión</h4>
            </div>
            <div class="card-body">
                <!-- Mensajes -->
                <div th:if="${param.error}" class="alert alert-danger">
                    Usuario o contraseña incorrectos
                </div>
                <div th:if="${param.logout}" class="alert alert-info">
                    Has cerrado sesión correctamente
                </div>
                <div th:if="${param.registered}" class="alert alert-success">
                    Usuario registrado correctamente. ¡Ahora puedes iniciar sesión!
                </div>

                <!-- Formulario de login -->
                <form id="loginForm" th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label for="username" class="form-label">Usuario</label>
                        <input type="text" class="form-control" id="username" name="username">
                        <div id="usernameError" class="error-message"></div>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Contraseña</label>
                        <input type="password" class="form-control" id="password" name="password">
                        <div id="passwordError" class="error-message"></div>
                    </div>
                    <button type="submit" class="btn btn-login w-100">Entrar</button>
                </form>

                <hr class="my-4">

                <div class="text-center">
                    <p class="mb-2">¿No tienes cuenta?</p>
                    <a th:href="@{/register}" class="btn btn-register w-100">
                        <i class="fas fa-user-plus me-2"></i>Regístrate aquí
                    </a>
                </div>

                <div class="text-center mt-3">
                    <small class="text-muted">
                        Usuarios de prueba:<br>
                        admin/12345 | gestor/12345 | usuario/12345
                    </small>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const loginForm = document.getElementById('loginForm');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const usernameError = document.getElementById('usernameError');
            const passwordError = document.getElementById('passwordError');

            if (loginForm) {
                loginForm.addEventListener('submit', function (event) {
                    event.preventDefault();
                    usernameInput.classList.remove('input-error');
                    passwordInput.classList.remove('input-error');
                    usernameError.textContent = '';
                    passwordError.textContent = '';

                    let isValid = true;

                    if (usernameInput.value.trim() === "") {
                        usernameInput.classList.add('input-error');
                        usernameError.textContent = 'El usuario es obligatorio';
                        isValid = false;
                    }

                    if (passwordInput.value.trim().length < 4) {
                        passwordInput.classList.add('input-error');
                        passwordError.textContent = 'La contraseña debe tener al menos 4 caracteres';
                        isValid = false;
                    }

                    if (isValid) {
                        loginForm.submit();
                    }
                });
            }
        });
    </script>
</body>

</html>
