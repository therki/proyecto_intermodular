<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>TODO App</title>
    <link rel="icon" type="image/png" th:href="@{/imgs/logo_todo.png}" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <link rel="stylesheet" th:href="@{/css/tablas.css}" />
    <link rel="stylesheet" th:href="@{/css/forms.css}" />
</head>

<body th:classappend="${user != null && user.role.name() == 'ADMIN'} ? 'role-admin' : 
                      (${user != null && user.role.name() == 'GESTOR'} ? 'role-gestor' : 'role-usuario')">
    <div th:replace="~{fragments/navbar :: navbar (title='Dashboard del Administrador', user=${user})}"></div>
    <div class="container mt-4">
        <!-- Header  -->
        <div class="bg-white rounded-3 p-4 mb-4 shadow-sm">
            <div class="page-header">
                <div>
                    <h2 class="mb-1"><i class="fas fa-users me-2 " style="color: var(--color-primary)"></i>Usuarios del
                        Sistema</h2>
                    <p class="text-muted mb-0">Gestiona los usuarios registrados en la plataforma</p>
                </div>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#userModal"
                    onclick="resetUserForm()">
                    <i class="fas fa-plus-circle me-2"></i>Nuevo Usuario
                </button>
            </div>
        </div>

        <!-- Tabla-->
        <div class="bg-white rounded-3 shadow-sm">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead style="background-color: var(--color-logo-primary); color: white;">
                        <tr>
                            <th class="py-3">ID</th>
                            <th class="py-3">Usuario</th>
                            <th class="py-3">Nombre Completo</th>
                            <th class="py-3">Email</th>
                            <th class="py-3">Rol</th>
                            <th class="py-3">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/forms/user-form :: userForm}"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        /* Cargar usuarios */
        function loadUsers() {
            $.ajax({
                url: '/api/admin/users',
                method: 'GET',
                success: function (users) {
                    displayUsers(users);
                }
            });
        }

        /* Listar usuarios en la tabla */
        function displayUsers(users) {
            let html = '';
            users.forEach(user => {
                let badgeClass = '';
                let badgeStyle = '';
                switch (user.role) {
                    case 'ADMIN':
                        badgeClass = 'role-admin-badge';
                        badgeStyle = 'background-color: #4c4874;';
                        break;
                    case 'GESTOR':
                        badgeClass = 'role-gestor-badge';
                        badgeStyle = 'background-color: #894870;';
                        break;
                    default:
                        badgeClass = 'role-usuario-badge';
                        badgeStyle = 'background-color: #805873;';
                }

                html += `
        <tr>
            <td class="py-3" data-label="ID">${user.id}</td>
            <td class="py-3" data-label="Usuario"><i class="fas fa-user-circle me-2 text-secondary"></i>${user.username}</td>
            <td class="py-3" data-label="Nombre">${user.fullname || '-'}</td>
            <td class="py-3" data-label="Email"><i class="fas fa-envelope me-2 text-muted"></i>${user.email}</td>
            <td class="py-3" data-label="Rol"><span class="badge" style="${badgeStyle} color: white; padding: 0.375rem 0.75rem; border-radius: 0.375rem;">${user.role}</span></td>
            <td class="py-3" data-label="Acciones">
                <div class="d-flex flex-wrap gap-1 justify-content-end justify-content-md-start">
                    <button class="btn btn-sm btn-outline-warning" onclick="editUser(${user.id})" title="Editar">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteUser(${user.id}, '${user.username}')" title="Eliminar">
                        <i class="fas fa-trash"></i>
                    </button>
                    ${user.role === 'USUARIO' ?
                        `<button class="btn btn-sm btn-outline-success" onclick="promoteUser(${user.id})" title="Promover">
                            <i class="fas fa-arrow-up"></i>
                        </button>` : ''}
                    ${user.role === 'GESTOR' ?
                        `<button class="btn btn-sm btn-outline-secondary" onclick="degradeUser(${user.id})" title="Degradar">
                            <i class="fas fa-arrow-down"></i>
                        </button>` : ''}
                </div>
            </td>
        </tr>
        `;
            });
            $('#usersTableBody').html(html);
        }
        /* Guardar usuario - crear - editar */
        function saveUser() {
            // Extraer valores 
            const userId = $('#userId').val();
            const username = $('#username').val().trim();
            const fullname = $('#fullname').val().trim();
            const email = $('#email').val().trim();
            const password = $('#password').val();
            const role = $('#role').val();

            // Limpiar errores
            $('#username, #fullname, #email, #password, #role').removeClass('is-invalid');

            let errors = [];

            // Validar username
            if (!username) {
                errors.push('El nombre de usuario es obligatorio');
                $('#username').addClass('is-invalid');
            } else if (username.length < 3) {
                errors.push('El nombre de usuario debe tener al menos 3 caracteres');
                $('#username').addClass('is-invalid');
            }

            // Validar fullname
            if (!fullname) {
                errors.push('El nombre completo es obligatorio');
                $('#fullname').addClass('is-invalid');
            }

            // Validar email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!email) {
                errors.push('El email es obligatorio');
                $('#email').addClass('is-invalid');
            } else if (!emailRegex.test(email)) {
                errors.push('El email no es válido');
                $('#email').addClass('is-invalid');
            }

            // Validar contraseña (solo para nuevos usuarios o cuando se cambia)
            if (!userId && !password) {
                errors.push('La contraseña es obligatoria para nuevos usuarios');
                $('#password').addClass('is-invalid');
            } else if (password && password.length < 4) {
                errors.push('La contraseña debe tener al menos 4 caracteres');
                $('#password').addClass('is-invalid');
            }

            // Validar rol
            if (!role) {
                errors.push('El rol es obligatorio');
                $('#role').addClass('is-invalid');
            }
            if (errors.length > 0) { return }
            // Construir objeto de datos
            const userData = {
                username: username,
                fullname: fullname,
                email: email,
                password: password,
                role: role
            };

            const method = userId ? 'PUT' : 'POST';
            const url = userId ? `/api/admin/user/${userId}` : '/api/admin/user';

            $.ajax({
                url: url,
                method: method,
                contentType: 'application/json',
                data: JSON.stringify(userData),
                success: function () {
                    $('#userModal').modal('hide');
                    loadUsers();
                    showNotification('Usuario guardado correctamente', 'success');
                },
                error: function (xhr) {
                    let message = 'Error al guardar';
                    if (xhr.responseJSON && xhr.responseJSON.detail) {
                        message = xhr.responseJSON.detail;
                    } else if (xhr.responseJSON && xhr.responseJSON.message) {
                        message = xhr.responseJSON.message;
                    }
                    showNotification(message, 'danger');
                }
            });
        }
        /* Editar usuario - abrir modal */
        function editUser(id) {
            $.get(`/api/admin/user/${id}`, function (user) {
                $('#userId').val(user.id);
                $('#username').val(user.username).removeClass('is-invalid');
                $('#fullname').val(user.fullname || '').removeClass('is-invalid');
                $('#email').val(user.email).removeClass('is-invalid');
                $('#role').val(user.role).removeClass('is-invalid');
                $('#password').val('').removeClass('is-invalid');
                $('#userModal').modal('show');
            });
        }
        /* Eliminar usuario - confirmar con alart */
        function deleteUser(id, username) {
            if (confirm(`¿Eliminar al usuario "${username}"?`)) {
                $.ajax({
                    url: `/api/admin/user/${id}`,
                    method: 'DELETE',
                    success: function () {
                        loadUsers();
                        showNotification('Usuario eliminado', 'success');
                    }
                });
            }
        }
        /* Promover usuario a gestor */
        function promoteUser(id) {
            if (confirm('¿Promover a Gestor?')) {
                $.ajax({
                    url: `/api/admin/user/${id}/promote`,
                    method: 'PUT',
                    success: function () {
                        loadUsers();
                        showNotification('Usuario promovido a Gestor', 'success');
                    }
                });
            }
        }

        /* Degradar gestor a usuario */
        function degradeUser(id) {
            if (confirm('¿Degradar a Usuario?')) {
                $.ajax({
                    url: `/api/admin/user/${id}/degradate`,
                    method: 'PUT',
                    success: function () {
                        loadUsers();
                        showNotification('Usuario gestor degradado a Usuario', 'success');
                    }
                });
            }
        }
        /* Limpiar formulario */
        function resetUserForm() {
            $('#userId').val('');
            $('#username').val('').removeClass('is-invalid');
            $('#fullname').val('').removeClass('is-invalid');
            $('#email').val('').removeClass('is-invalid');
            $('#password').val('').removeClass('is-invalid');
            $('#role').val('USUARIO').removeClass('is-invalid');
            $('#userForm')[0].reset();
        }

        /* Mostrar notificacion */
        function showNotification(message, type) {
            const alert = $(`
            <div class="alert alert-${type} alert-dismissible fade show position-fixed top-0 end-0 m-3" style="z-index: 9999;">
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        `);
            $('body').append(alert);
            setTimeout(() => alert.alert('close'), 3000);
        }
        /* Listar usuarios */
        $(document).ready(function () {
            loadUsers();
        });
    </script>
</body>

</html>
